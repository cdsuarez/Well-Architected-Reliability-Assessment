# WARA Assessment Pipeline
# This pipeline runs the WARA assessment toolchain on Microsoft-hosted agents
# It supports both single subscription and tenant-wide assessments
#
# Pipeline Modes:
# 1. Single Subscription: Set assessmentScope=single and provide subscriptionId in config
# 2. Tenant-Wide: Set assessmentScope=tenant and configure subscription filters in config
#
# Pipeline Steps:
# 1. Load configuration from wara-config.json
# 2. Install required modules
# 3. Run WARA Collector (single or tenant-wide)
# 4. Run WARA Analyzer
# 5. Generate Reports
# 6. Publish artifacts

name: $(Date:yyyyMMdd)$(Rev:.r)
trigger: none # Manual trigger only
pr: none

variables:
  - name: azureSubscription
    value: 'AzureResiliencySC' # Azure DevOps service connection name
  - name: configFile
    value: 'wara-tenant-config.json' # Path to the configuration file
  - name: outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/wara-output'
  - name: assessmentScope
    value: 'tenant' # 'single' or 'tenant'
  - name: tenantId
    value: '' # Will be read from the config file

stages:
- stage: WARA_Assessment
  displayName: 'Run WARA Assessment'
  jobs:
  - job: Run_Assessment
    displayName: 'Run WARA Assessment'
    pool:
      vmImage: 'windows-latest' # Using Windows for better PowerShell compatibility
    steps:
    - checkout: self
      fetchDepth: 1
      clean: true

    - task: PowerShell@2
      displayName: 'Install PowerShell 7.4'
      inputs:
        targetType: 'inline'
        script: |
          # Install PowerShell 7.4
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri https://github.com/PowerShell/PowerShell/releases/download/v7.4.0/PowerShell-7.4.0-win-x64.msi -OutFile PowerShell-7.4.0-win-x64.msi
          Start-Process msiexec.exe -Wait -ArgumentList '/I PowerShell-7.4.0-win-x64.msi /quiet ADD_EXPLORER_CONTEXT_MENU_OPENPOWERSHELL=1 ENABLE_PSREMOTING=1 REGISTER_MANIFEST=1'
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")

    - task: PowerShell@2
      displayName: 'Install Required Modules'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |

    - task: AzurePowerShell@5
      displayName: 'Install Required Modules'
      inputs:
        azureSubscription: $(azureSubscription)
        scriptType: 'inlineScript'
        inline: |
          Install-Module -Name Az.Accounts, Az.Resources, ImportExcel -Force -AllowClobber -Scope CurrentUser
          Import-Module Az.Accounts, Az.Resources
        azurePowerShellVersion: 'LatestVersion'
        pwsh: true

    - ${{ if eq(variables['assessmentScope'], 'tenant') }}:
      - task: AzurePowerShell@5
        displayName: 'Run WARA Tenant Assessment'
        inputs:
          azureSubscription: $(azureSubscription)
          scriptType: 'filePath'
          scriptPath: '$(Build.SourcesDirectory)/scripts/Invoke-WARATenantAssessment.ps1'
          scriptArguments: >
            -ConfigFile '$(configFile.secureFilePath)'
            -OutputDirectory '$(outputDirectory)'
          azurePowerShellVersion: 'LatestVersion'
          pwsh: true

    - ${{ if eq(variables['assessmentScope'], 'single') }}:
      - task: PowerShell@2
        displayName: 'Run WARA Collector (Single Subscription)'
        inputs:
          targetType: 'inline'
          pwsh: true
          script: |
            # Load configuration
            $config = Get-Content '$(configFile.secureFilePath)' -Raw | ConvertFrom-Json
            
            # Set output directory
            if (-not (Test-Path -Path '$(outputDirectory)')) {
                New-Item -ItemType Directory -Path '$(outputDirectory)' -Force | Out-Null
            }
            
            # Import WARA module
            Import-Module WARA -Force
            
            # Run collector
            $params = @{
                ConfigFile = '$(configFile.secureFilePath)'
                OutputDirectory = '$(outputDirectory)'
            }
            
            if ($config.azure.subscriptionId) {
                $params['SubscriptionId'] = $config.azure.subscriptionId
            }
            
            Start-WARACollector @params
            
            # Get the generated JSON file for the analyzer
            $jsonFile = Get-ChildItem -Path '$(outputDirectory)' -Filter 'WARA_*.json' | 
                        Sort-Object LastWriteTime -Descending | 
                        Select-Object -First 1
            
            if (-not $jsonFile) {
                throw 'No WARA JSON file was generated by the collector'
            }
            
            # Set output variable for analyzer
            Write-Host "##vso[task.setvariable variable=waraJsonFile]$(outputDirectory)/$($jsonFile.Name)"

    # Run analyzer for both single and tenant-wide assessments
    - task: PowerShell@2
      displayName: 'Run WARA Analyzer'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          # For tenant-wide, the JSON file is generated by Invoke-WARATenantAssessment.ps1
          # For single, we use the file found in the previous step
          $jsonFile = '$(waraJsonFile)'
          if (-not $jsonFile -or -not (Test-Path $jsonFile)) {
              # Try to find the latest JSON file if not set
              $jsonFile = Get-ChildItem -Path '$(outputDirectory)' -Filter 'WARA_*.json' | 
                          Sort-Object LastWriteTime -Descending | 
                          Select-Object -First 1 -ExpandProperty FullName
              
              if (-not $jsonFile) {
                  throw 'No WARA JSON file found for analysis'
              }
          }
          
          # Import WARA module
          Import-Module WARA -Force
          
          # Run analyzer
          Start-WARAAnalyzer -JSONFile $jsonFile -OutputDirectory '$(outputDirectory)'
          
          # Get the generated Excel file
          $excelFile = Get-ChildItem -Path '$(outputDirectory)' -Filter 'Expert-Analysis-*.xlsx' | 
                       Sort-Object LastWriteTime -Descending | 
                       Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $excelFile) {
              throw 'No analysis Excel file was generated'
          }
          
          # Set output variable for report generation
          Write-Host "##vso[task.setvariable variable=waraExcelFile]'$excelFile'"
          
          # Add specialized workloads if configured
          $config = Get-Content '$(configFile.secureFilePath)' -Raw | ConvertFrom-Json
          if ($config.assessment.includeSpecializedWorkloads) {
              $collectorParams += $config.assessment.specializedWorkloadParams
          }
          
          # Add resource groups if specified
          if ($config.azure.resourceGroups -and $config.azure.resourceGroups.Count -gt 0) {
              $collectorParams['ResourceGroups'] = $config.azure.resourceGroups
          }
          
          # Add regions if specified
          if ($config.assessment.regions -and $config.assessment.regions.Count -gt 0) {
              $collectorParams['Regions'] = $config.assessment.regions
          }
          
          # Add tags if specified
          if ($config.assessment.tags -and $config.assessment.tags.PSObject.Properties.Count -gt 0) {
              $collectorParams['Tags'] = $config.assessment.tags | ConvertTo-Json -Compress
          }
          
          Write-Host "Running WARA Collector with parameters:"
          $collectorParams | ConvertTo-Json -Depth 5 | Write-Host
          
          try {
              Start-WARACollector @collectorParams
              $collectorOutput = Get-ChildItem -Path "$(outputDirectory)" -Filter "WARA_File_*.json" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              Write-Host "##vso[task.setvariable variable=collectorOutputFile;isOutput=true]$($collectorOutput.FullName)"
              Write-Host "Collector output file: $($collectorOutput.FullName)"
          }
          catch {
              Write-Error "Error running WARA Collector: $_"
              throw $_
          }
      name: runCollector

    - task: PowerShell@2
      displayName: 'Run WARA Analyzer'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $collectorOutputFile = "$(runCollector.collectorOutputFile)"
          if (-not (Test-Path $collectorOutputFile)) {
              throw "Collector output file not found: $collectorOutputFile"
          }
          
          # Run WARA Analyzer
          $analyzerParams = @{
              JSONFile = $collectorOutputFile
              OutputDirectory = "$(outputDirectory)"
              Verbose = $true
          }
          
          Write-Host "Running WARA Analyzer with parameters:"
          $analyzerParams | ConvertTo-Json -Depth 5 | Write-Host
          
          try {
              Start-WARAAnalyzer @analyzerParams
              $analyzerOutput = Get-ChildItem -Path "$(outputDirectory)" -Filter "Expert-Analysis-*.xlsx" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
              Write-Host "##vso[task.setvariable variable=analyzerOutputFile;isOutput=true]$($analyzerOutput.FullName)"
              Write-Host "Analyzer output file: $($analyzerOutput.FullName)"
          }
          catch {
              Write-Error "Error running WARA Analyzer: $_"
              throw $_
          }
      name: runAnalyzer

    - task: PowerShell@2
      displayName: 'Generate HTML/CSV Reports'
      inputs:
        targetType: 'inline'
        pwsh: true
        script: |
          $analyzerOutputFile = "$(runAnalyzer.analyzerOutputFile)"
          if (-not (Test-Path $analyzerOutputFile)) {
              throw "Analyzer output file not found: $analyzerOutputFile"
          }
          
          # Import configuration
          $configFile = "$(Build.SourcesDirectory)/$(configFile)"
          . "$(Build.SourcesDirectory)/scripts/Get-WARAConfig.ps1"
          $config = Get-WARAConfig -ConfigPath $configFile
          
          # Generate HTML/CSV reports
          $reportParams = @{
              ExcelFile = $analyzerOutputFile
              OutputDirectory = "$(outputDirectory)/reports"
              CustomerName = $config.assessment.customerName
              WorkloadName = $config.assessment.workloadName
              Environment = $config.assessment.environment
              Verbose = $true
          }
          
          # Add assessment date if available
          $assessmentDate = Get-Date -Format "yyyy-MM-dd"
          $reportParams['AssessmentDate'] = $assessmentDate
          
          Write-Host "Generating reports with parameters:"
          $reportParams | ConvertTo-Json -Depth 5 | Write-Host
          
          try {
              # Import the WARA module to get our custom function
              Import-Module -Name "$(Build.SourcesDirectory)/src/modules/wara/wara.psd1" -Force
              
              # Create output directory
              New-Item -ItemType Directory -Path "$(outputDirectory)/reports" -Force | Out-Null
              
              # Generate reports
              $reportOutput = Export-WARAReport @reportParams
              
              # Publish to wiki if configured
              if ($config.publishing.publishToWiki -and $config.publishing.wikiPath) {
                  $wikiPath = Join-Path -Path $(Build.SourcesDirectory) -ChildPath $config.publishing.wikiPath
                  if (Test-Path $wikiPath) {
                      Write-Host "Publishing reports to wiki at $wikiPath"
                      Copy-Item -Path "$($reportOutput.SummaryFile)" -Destination $wikiPath -Force
                      
                      # Update wiki index if it exists
                      $indexFile = Join-Path -Path $wikiPath -ChildPath "_Sidebar.md"
                      if (-not (Test-Path $indexFile)) {
                          $indexContent = @"
# WARA Reports

- [Latest Report]($(Split-Path -Leaf $reportOutput.SummaryFile))
"@
                          $indexContent | Out-File -FilePath $indexFile -Encoding utf8
                      }
                  }
              }
              
              # Publish to storage account if configured
              if ($config.publishing.publishToStorage -and $config.publishing.storageAccountName) {
                  $storageContext = New-AzStorageContext -ConnectionString $env:AzureWebJobsStorage
                  $containerName = $config.publishing.storageContainer
                  
                  # Create container if it doesn't exist
                  $container = Get-AzStorageContainer -Name $containerName -Context $storageContext -ErrorAction SilentlyContinue
                  if (-not $container) {
                      $container = New-AzStorageContainer -Name $containerName -Context $storageContext -Permission Blob
                  }
                  
                  # Upload reports
                  $reports = Get-ChildItem -Path "$(outputDirectory)/reports" -Recurse -File
                  foreach ($file in $reports) {
                      $blobName = "$($config.assessment.customerName)/$($config.assessment.workloadName)/$assessmentDate/$($file.Name)"
                      Set-AzStorageBlobContent -File $file.FullName -Container $containerName -Blob $blobName -Context $storageContext -Force | Out-Null
                      Write-Host "Uploaded $($file.Name) to storage account"
                  }
              }
              
              # Output the report summary file path
              if (Test-Path $reportOutput.SummaryFile) {
                  Write-Host "##vso[task.setvariable variable=reportSummaryFile;isOutput=true]$($reportOutput.SummaryFile)"
                  Write-Host "Report summary file: $($reportOutput.SummaryFile)"
              }
              else {
                  Write-Warning "Report summary file not found"
              }
              
              # Send notifications if configured
              if ($config.notifications.sendEmail -and $config.notifications.emailRecipients.Count -gt 0) {
                  $emailBody = @"
                  <h1>WARA Assessment Report</h1>
                  <p>A new WARA assessment report is available for $($config.assessment.customerName) - $($config.assessment.workloadName).</p>
                  <p>Assessment Date: $assessmentDate</p>
                  <p>Download the report from the build artifacts or view it in the published location.</p>
                  "@
                  
                  # This is a placeholder - you would typically use Send-MailMessage or a similar cmdlet
                  # with your email server configuration
                  Write-Host "Email notification would be sent to: $($config.notifications.emailRecipients -join ', ')"
              }
              
              if ($config.notifications.slackWebhookUrl) {
                  # This is a placeholder - you would typically use Invoke-RestMethod
                  # to send a message to a Slack webhook
                  Write-Host "Slack notification would be sent to the configured webhook"
              }
          }
          catch {
              Write-Error "Error generating reports: $_"
              throw $_
          }
      name: generateReports

    - task: PublishBuildArtifacts@1
      displayName: 'Publish WARA Artifacts'
      inputs:
        PathtoPublish: '$(outputDirectory)'
        ArtifactName: 'wara-assessment-results'
        publishLocation: 'Container'
